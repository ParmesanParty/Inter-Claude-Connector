services:
  icc:
    image: sitruss/icc:latest
    # build: .  # uncomment to build locally
    container_name: icc
    restart: unless-stopped
    network_mode: host
    volumes:
      - icc-data:/home/icc/.icc
    environment: {}
      # ICC_WEB_ENABLED: "true"
      # ICC_ENROLL_ENABLED: "true"
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  icc-data:
