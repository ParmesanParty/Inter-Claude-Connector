name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: parmesanparty/icc

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      digest-amd64: ${{ steps.set-digest.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.set-digest.outputs.digest-arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Compute cache scope
        id: cache-scope
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          echo "scope=build-${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push (digest only)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.cache-scope.outputs.scope }}
          cache-to: type=gha,mode=max,scope=${{ steps.cache-scope.outputs.scope }}

      - name: Export digest to job output
        id: set-digest
        env:
          PLATFORM: ${{ matrix.platform }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          key="digest-${PLATFORM##*/}"
          echo "$key=$DIGEST" >> "$GITHUB_OUTPUT"

  merge:
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create multi-arch manifest
        env:
          IMAGE: ${{ env.IMAGE }}
          DIGEST_AMD64: ${{ needs.build.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ needs.build.outputs.digest-arm64 }}
        run: |
          set -euo pipefail
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create $tags \
            "${IMAGE}@${DIGEST_AMD64}" \
            "${IMAGE}@${DIGEST_ARM64}"

      - name: Inspect manifest
        env:
          IMAGE: ${{ env.IMAGE }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${VERSION}"
